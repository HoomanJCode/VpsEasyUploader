<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — VpsEasyUploader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css?v={{ asset_version }}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <i class="bi bi-cloud-upload display-3 text-primary"></i>
                    <h1 class="h3 mt-2">VpsEasyUploader</h1>
                    <p class="text-muted">Set your admin password to get started</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endif %}
                        <form method="POST" novalidate>
                            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                            <div class="mb-3">
                                <label for="password" class="form-label">Admin Password</label>
                                <input type="password" class="form-control" id="password" name="password"
                                       minlength="8" required autofocus
                                       placeholder="At least 8 characters">
                                <div class="form-text">This password protects your upload server.</div>
                            </div>
                            <div class="mb-3">
                                <label for="confirm" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirm" name="confirm"
                                       minlength="8" required
                                       placeholder="Repeat your password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-shield-lock me-1"></i> Set Password &amp; Login
                            </button>
                        </form>
                    </div>
                </div>
                <p class="text-center text-muted mt-3 small">
                    Your password is stored securely (hashed) on this server.
                </p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
